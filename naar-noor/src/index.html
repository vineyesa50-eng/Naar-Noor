<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naar & Noor — Authentic Himalayan Restaurant</title>
  <meta name="description" content="Experience Naar & Noor — authentic Himalayan recipes, flame-grilled specialties, and modern dining. Reserve your table or order online.">
  <meta name="keywords" content="Himalayan restaurant, Naar Noor, flame-grilled, momos, mountain cuisine, dine-in, takeaway, delivery">
  <meta name="author" content="Naar & Noor">
  <base href="/">

  <!-- Canonical -->
  <link rel="canonical" href="https://www.naarnooor.com/">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Naar & Noor">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="msapplication-TileColor" content="#0a0a0a">

  <!-- Open Graph -->
  <meta property="og:type" content="restaurant">
  <meta property="og:url" content="https://www.naarnooor.com/">
  <meta property="og:title" content="Naar & Noor — Authentic Himalayan Restaurant">
  <meta property="og:description" content="Experience authentic Himalayan recipes, flame-grilled specialties, and modern dining. Reserve your table or order online.">
  <meta property="og:image" content="https://www.naarnooor.com/assets/hero/hero.webp">
  <meta property="og:site_name" content="Naar & Noor">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Naar & Noor — Authentic Himalayan Restaurant">
  <meta name="twitter:description" content="Authentic Himalayan cuisine with flame-grilled specialties. Reserve your table or order online.">
  <meta name="twitter:image" content="https://www.naarnooor.com/assets/hero/hero.webp">

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">

  <!-- ── DNS / Preconnect ─────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://code.iconify.design">
  <link rel="dns-prefetch" href="https://code.iconify.design">

  <!-- ── Critical asset preloads ──────────────────────── -->
  <link rel="preload" href="assets/hero/hero.webp" as="image" type="image/webp" fetchpriority="high">

  <!-- ── Fonts — non-render-blocking ──────────────────── -->
  <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Forum&family=Open+Sans:wght@300;400;500;600&display=swap"
        onload="this.rel='stylesheet'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Forum&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  </noscript>

  <!-- ── Iconify — deferred ───────────────────────────── -->
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js" defer></script>

  <!-- ── Structured Data ──────────────────────────────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Restaurant",
    "name": "Naar & Noor",
    "description": "Authentic Himalayan cuisine with flame-grilled specialties, traditional recipes, and modern dining.",
    "servesCuisine": "Himalayan",
    "priceRange": "$$",
    "telephone": "+44 (0) 1481 123456",
    "url": "https://www.naarnooor.com",
    "menu": "https://www.naarnooor.com/#menu",
    "acceptsReservations": "True"
  }
  </script>

  <!-- ── Splash screen styles (inline — zero network cost) ── -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: auto;
      background: #0a0a0a;
    }

    body {
      background: #0a0a0a;
      font-family: 'Open Sans', system-ui, sans-serif;
      overflow-x: hidden;
    }

    /* ── Splash overlay ── */
    #nn-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      transition: opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #nn-splash.nn-fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Logo mark */
    .nn-splash-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: nn-rise 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .nn-splash-mark {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #C65A1E 0%, #8B4513 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      box-shadow: 0 0 40px rgba(198, 90, 30, 0.35);
      animation: nn-pulse 2.4s ease-in-out infinite;
    }
    .nn-splash-name {
      font-size: 22px;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.04em;
      font-weight: 300;
    }
    .nn-splash-sub {
      font-size: 10px;
      color: #C65A1E;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-top: -8px;
    }

    /* Loading bar */
    .nn-splash-bar {
      width: 120px;
      height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 1px;
      overflow: hidden;
      animation: nn-rise 0.55s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .nn-splash-bar::after {
      content: '';
      display: block;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #C65A1E, transparent);
      border-radius: 1px;
      animation: nn-slide 1.4s ease-in-out infinite;
    }

    @keyframes nn-rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes nn-pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(198,90,30,0.25); }
      50%       { box-shadow: 0 0 50px rgba(198,90,30,0.55); }
    }
    @keyframes nn-slide {
      0%   { transform: translateX(-250%); }
      100% { transform: translateX(600%); }
    }
  </style>
</head>
<body>
  <script>
    // Prevent browser scroll restoration flicker BEFORE Angular boots
    if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
    window.scrollTo(0, 0);
  </script>

  <!-- Splash screen — removed by AppComponent after first navigation -->
  <div id="nn-splash" aria-hidden="true">
    <div class="nn-splash-logo">
      <div class="nn-splash-mark">2N</div>
      <div>
        <div class="nn-splash-name">Naar &amp; Noor</div>
        <div class="nn-splash-sub">Himalayan Kitchen</div>
      </div>
    </div>
    <div class="nn-splash-bar"></div>
  </div>

  <app-root></app-root>
</body>
</html>
