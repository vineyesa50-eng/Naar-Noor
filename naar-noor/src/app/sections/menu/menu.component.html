<section id="menu" class="py-16 sm:py-20 md:py-24 px-4 sm:px-6 bg-[#0d0d0d]">
  <div class="max-w-5xl mx-auto">

    <!-- Header -->
    <div reveal [revealDelay]="0" class="text-center mb-10 md:mb-12">
      <span class="text-[#C65A1E] text-xs font-medium tracking-[0.2em] uppercase mb-3 block">Signatures</span>
      <h2 class="font-['Forum'] text-3xl sm:text-4xl md:text-5xl text-white tracking-tight">Crafted With Passion</h2>
    </div>

    <!-- Category tabs -->
    <div *ngIf="!loading && !error" reveal [revealDelay]="80"
         class="flex flex-wrap items-center justify-center gap-2 mb-10 md:mb-12">
      <button *ngFor="let cat of categories"
              (click)="setCategory(cat)"
              class="px-4 py-2 rounded-full text-xs font-medium tracking-wider uppercase transition-all duration-300"
              [ngClass]="activeCategory === cat
                ? 'bg-[#C65A1E] text-white shadow-[0_0_15px_rgba(198,90,30,0.3)]'
                : 'text-neutral-400 border border-white/10 hover:border-white/25 hover:text-white'">
        {{ cat }}
      </button>
    </div>

    <!-- Skeleton -->
    <div *ngIf="loading" class="space-y-8">
      <div *ngFor="let i of [1,2,3,4,5]" class="animate-pulse">
        <div class="flex items-baseline justify-between mb-2">
          <div class="h-5 bg-white/10 rounded w-48"></div>
          <div class="h-5 bg-white/10 rounded w-14"></div>
        </div>
        <div class="h-4 bg-white/5 rounded w-full"></div>
      </div>
    </div>

    <!-- Error -->
    <div *ngIf="error" class="text-center py-12 text-neutral-500 text-sm">
      Unable to load the menu right now. Please call us or visit in person.
    </div>

    <!-- Menu list — 2 columns on lg+ -->
    <div *ngIf="!loading && !error"
         class="grid grid-cols-1 lg:grid-cols-2 gap-x-12 gap-y-8">
      <div *ngFor="let item of filteredItems; let i = index"
           reveal
           [revealDelay]="(i % 10) * 40"
           revealFrom="bottom"
           class="group">
        <div class="flex items-start justify-between gap-4 mb-1.5">
          <div class="flex-1 min-w-0">
            <div class="flex items-baseline gap-2 flex-wrap">
              <h3 class="font-['Forum'] text-lg sm:text-xl md:text-2xl text-white tracking-tight group-hover:text-[#C65A1E] transition-colors leading-tight">
                {{ item.name }}
              </h3>
              <span *ngIf="itemCount(item.id) > 0"
                    class="text-[10px] font-medium bg-[#C65A1E]/15 text-[#C65A1E] px-2 py-0.5 rounded-full border border-[#C65A1E]/30">
                ×{{ itemCount(item.id) }} in cart
              </span>
            </div>
          </div>
          <div class="flex items-center gap-3 shrink-0">
            <span class="font-['Forum'] text-lg sm:text-xl text-white">{{ item.priceFormatted }}</span>
            <button (click)="addToCart(item)"
                    [class]="addedId === item.id
                      ? 'w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center transition-all duration-300 shadow-[0_0_12px_rgba(16,185,129,0.4)]'
                      : 'w-8 h-8 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-neutral-400 hover:bg-[#C65A1E] hover:border-[#C65A1E] hover:text-white hover:shadow-[0_0_12px_rgba(198,90,30,0.3)] transition-all duration-300'">
              <iconify-icon [icon]="addedId === item.id ? 'solar:check-read-linear' : 'solar:cart-plus-linear'" width="15"></iconify-icon>
            </button>
          </div>
        </div>
        <p class="text-xs sm:text-sm text-neutral-400 font-light leading-relaxed">{{ item.description }}</p>
        <div *ngIf="item.isVegetarian || item.isVegan" class="mt-1.5 flex gap-2">
          <span *ngIf="item.isVegan" class="text-[10px] tracking-widest uppercase text-[#C65A1E] font-medium">Vegan</span>
          <span *ngIf="item.isVegetarian && !item.isVegan" class="text-[10px] tracking-widest uppercase text-emerald-500 font-medium">Vegetarian</span>
        </div>
      </div>
    </div>

    <!-- CTA -->
    <div *ngIf="!loading && !error" class="mt-14 sm:mt-16 text-center">
      <a href="#" class="inline-flex items-center justify-center px-8 py-3.5 text-sm font-medium text-white border border-white/20 rounded-xl hover:bg-white hover:text-[#0a0a0a] transition-all duration-300">
        View Full Menu
      </a>
    </div>

  </div>
</section>
