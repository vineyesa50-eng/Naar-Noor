<section id="blog" class="py-16 sm:py-20 md:py-24 px-4 sm:px-6">
  <div class="max-w-7xl mx-auto">

    <div reveal [revealDelay]="0" class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-12 md:mb-16 gap-4">
      <div>
        <span class="text-[#C65A1E] text-xs font-medium tracking-[0.2em] uppercase mb-3 block">Journal</span>
        <h2 class="font-['Forum'] text-3xl sm:text-4xl md:text-5xl text-white tracking-tight">Stories From The Fire</h2>
      </div>
      <a href="#" class="text-sm text-neutral-400 hover:text-[#C65A1E] transition-colors flex items-center gap-2 shrink-0">
        View All Posts
        <iconify-icon icon="solar:arrow-right-linear" width="16"></iconify-icon>
      </a>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 sm:gap-6">
      <a *ngFor="let post of posts; let i = index"
         href="#"
         reveal
         [revealDelay]="i * 100"
         revealFrom="bottom"
         class="group block rounded-2xl bg-[#111] border border-white/5 overflow-hidden hover:border-white/10 transition-colors">
        <div class="aspect-[16/10] overflow-hidden">
          <img
            [src]="post.image"
            [alt]="post.title"
            loading="lazy"
            class="w-full h-full object-cover opacity-80 group-hover:scale-105 group-hover:opacity-100 transition-all duration-700">
        </div>
        <div class="p-5 sm:p-6">
          <span class="text-xs text-neutral-500 mb-2 sm:mb-3 block">{{ post.date }}</span>
          <h3 class="font-['Forum'] text-lg sm:text-xl text-white tracking-tight mb-2 sm:mb-3 group-hover:text-[#C65A1E] transition-colors leading-snug">
            {{ post.title }}
          </h3>
          <p class="text-sm text-neutral-400 font-light mb-5 sm:mb-6 line-clamp-2 leading-relaxed">{{ post.excerpt }}</p>
          <span class="text-xs font-medium text-neutral-400 group-hover:text-[#C65A1E] transition-colors flex items-center gap-1.5 uppercase tracking-wider">
            Read More
            <iconify-icon icon="solar:arrow-right-linear" width="14"></iconify-icon>
          </span>
        </div>
      </a>
    </div>

  </div>
</section>
