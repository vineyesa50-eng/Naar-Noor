<section class="relative min-h-[260px] sm:min-h-[300px] md:min-h-[380px] py-20 sm:py-24 md:py-32 flex items-center justify-center overflow-hidden">
  <div class="absolute inset-0">
    <img
      src="assets/cinematic/Grill-BBQ.jpg"
      alt="Cinematic food preparation"
      loading="lazy"
      class="w-full h-full object-cover opacity-35">
    <div class="absolute inset-0 bg-gradient-to-r from-[#0a0a0a]/95 via-[#0a0a0a]/80 to-[#0a0a0a]/95"></div>
  </div>

  <div reveal [revealDelay]="0" revealFrom="scale"
       class="relative z-10 text-center px-4 sm:px-6 max-w-3xl mx-auto">
    <span class="text-[#C65A1E] text-xs font-medium tracking-[0.2em] uppercase mb-4 block">The Experience</span>
    <h2 class="font-['Forum'] text-3xl sm:text-4xl md:text-5xl lg:text-6xl text-white tracking-tight mb-5 drop-shadow-[0_2px_10px_rgba(0,0,0,0.8)]">
      Discover Naar &amp; Noor
    </h2>
    <p class="text-sm sm:text-base md:text-lg text-neutral-300 font-light leading-relaxed drop-shadow-[0_2px_8px_rgba(0,0,0,0.8)]">
      Explore the passion, fire, and rigorous craftsmanship behind every dish we serve.
      It's more than a meal — it's a journey to the top of the world.
    </p>
  </div>
</section>
