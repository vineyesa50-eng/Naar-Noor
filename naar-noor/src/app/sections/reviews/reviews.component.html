<section class="py-24 bg-[#0d0d0d] px-6 overflow-hidden">
  <div class="max-w-7xl mx-auto">

    <!-- Header -->
    <div reveal [revealDelay]="0" class="text-center mb-16">
      <span class="text-[#C65A1E] text-xs font-medium tracking-[0.2em] uppercase mb-3 block">Testimonials</span>
      <h2 class="font-['Forum'] text-4xl md:text-5xl text-white tracking-tight mb-4">What Our Guests Say</h2>
      <p class="text-sm text-neutral-400 max-w-md mx-auto font-light leading-relaxed">
        Real experiences from the people who matter most — our guests.
      </p>
    </div>

    <!-- Skeleton -->
    <div *ngIf="loading" class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div *ngFor="let i of [1,2,3]" class="p-8 rounded-2xl bg-[#111] border border-white/5 animate-pulse">
        <div class="flex gap-1 mb-6">
          <div *ngFor="let s of [1,2,3,4,5]" class="w-4 h-4 bg-white/10 rounded"></div>
        </div>
        <div class="space-y-2 mb-8">
          <div class="h-4 bg-white/5 rounded w-full"></div>
          <div class="h-4 bg-white/5 rounded w-4/5"></div>
          <div class="h-4 bg-white/5 rounded w-3/5"></div>
        </div>
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-white/10"></div>
          <div class="h-3 bg-white/10 rounded w-20"></div>
        </div>
      </div>
    </div>

    <!-- Error -->
    <div *ngIf="error" class="text-center py-12 text-neutral-500 text-sm">
      Unable to load reviews right now.
    </div>

    <!-- Review cards -->
    <div *ngIf="!loading && !error" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 sm:gap-6">
      <div *ngFor="let review of reviews; let i = index"
           reveal
           [revealDelay]="revealDelay(i)"
           revealFrom="bottom"
           class="group relative p-8 rounded-2xl bg-[#111] border border-white/5 hover:border-[#C65A1E]/20 transition-colors duration-500 flex flex-col">

        <!-- Quote decoration -->
        <iconify-icon icon="solar:quote-right-bold-duotone" width="44"
          class="absolute top-6 right-6 text-white/4 group-hover:text-[#C65A1E]/10 transition-colors duration-500">
        </iconify-icon>

        <!-- Stars -->
        <div class="flex items-center gap-1 mb-5 text-[#C65A1E]">
          <iconify-icon *ngFor="let s of review.stars" icon="solar:star-bold" width="15"></iconify-icon>
        </div>

        <!-- Review text -->
        <p class="text-sm text-neutral-200 font-light italic leading-relaxed flex-1 mb-8">
          "{{ review.text }}"
        </p>

        <!-- Author row -->
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <!-- Initial avatar -->
            <div class="w-9 h-9 rounded-full bg-[#C65A1E]/15 border border-[#C65A1E]/25 flex items-center justify-center flex-shrink-0">
              <span class="text-xs font-semibold text-[#C65A1E]">{{ review.initial }}</span>
            </div>
            <span class="text-xs text-neutral-300 font-medium">{{ review.author }}</span>
          </div>

          <!-- Source badge -->
          <span *ngIf="review.source"
                class="text-[10px] text-neutral-500 uppercase tracking-widest border border-white/8 px-2.5 py-1 rounded-full">
            {{ review.source }}
          </span>
        </div>

      </div>
    </div>

  </div>
</section>
