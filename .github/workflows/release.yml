name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build Release Assets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Rebuild native modules
        run: npm rebuild
      
      - name: Build for production
        run: npm run build:prod
      
      - name: Create distribution archive
        run: |
          cd dist/lost-yeti
          zip -r ../../lost-yeti-${{ github.ref_name }}.zip .
          tar -czf ../../lost-yeti-${{ github.ref_name }}.tar.gz .
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            lost-yeti-*.zip
            lost-yeti-*.tar.gz

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            # First release, get all commits
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # Get commits since last tag
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          # Save to output
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Extract version info
        id: version
        run: |
          VERSION=${{ github.ref_name }}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, changelog]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 🎉 Release ${{ github.ref_name }}
            
            ### What's Changed
            ${{ needs.changelog.outputs.changelog }}
            
            ### 📦 Installation
            
            Download the appropriate archive for your platform:
            - **ZIP**: `lost-yeti-${{ github.ref_name }}.zip`
            - **TAR.GZ**: `lost-yeti-${{ github.ref_name }}.tar.gz`
            
            ### 🚀 Deployment
            
            See [DEPLOYMENT.md](docs/DEPLOYMENT.md) for deployment instructions.
            
            ### 📝 Full Changelog
            
            See [CHANGELOG.md](docs/CHANGELOG.md) for complete changelog.
            
            ---
            
            **Docker Image**: `docker pull ghcr.io/yourusername/lost-yeti:${{ github.ref_name }}`
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            lost-yeti-*.zip
            lost-yeti-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-release:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  npm-release:
    name: Publish to npm (if applicable)
    runs-on: ubuntu-latest
    needs: [build]
    if: false  # Enable if you want to publish to npm
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [create-release, docker-release]
    if: always()
    
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            🎉 New Release: ${{ github.ref_name }}
            
            Release: ${{ needs.create-release.result }}
            Docker: ${{ needs.docker-release.result }}
            
            View release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          custom_payload: |
            {
              text: `🎉 New Release: ${process.env.AS_VERSION}`,
              blocks: [
                {
                  type: 'section',
                  text: {
                    type: 'mrkdwn',
                    text: `*Release ${process.env.AS_VERSION}*\nRelease: ${process.env.AS_RELEASE}\nDocker: ${process.env.AS_DOCKER}\n<https://github.com/${{ github.repository }}/releases/tag/${process.env.AS_VERSION}|View Release>`
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          AS_VERSION: ${{ github.ref_name }}
          AS_RELEASE: ${{ needs.create-release.result }}
          AS_DOCKER: ${{ needs.docker-release.result }}
        if: always() && secrets.SLACK_WEBHOOK != ''
      
      - name: Create announcement issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🎉 Release ${{ github.ref_name }} is out!`,
              body: `A new version has been released!\n\nSee the [release notes](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}) for details.`,
              labels: ['announcement', 'release']
            });
