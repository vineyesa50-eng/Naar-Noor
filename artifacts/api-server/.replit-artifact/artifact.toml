kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "bash /home/runner/workspace/artifacts/api-server/run-dev.sh"

[services.production]

[services.production.build]
args = ["dotnet", "publish", "/home/runner/workspace/artifacts/api-server/src/NaarNoor.API/NaarNoor.API.csproj", "-c", "Release", "-o", "/home/runner/workspace/artifacts/api-server/publish"]

[services.production.run]
args = ["dotnet", "/home/runner/workspace/artifacts/api-server/publish/NaarNoor.API.dll"]

[services.production.run.env]
PORT = "8080"
ASPNETCORE_ENVIRONMENT = "Production"

[services.production.health.startup]
path = "/api/healthz"
