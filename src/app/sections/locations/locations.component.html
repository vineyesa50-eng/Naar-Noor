<section id="locations" class="py-24 px-6">
  <div class="max-w-5xl mx-auto bg-[#0f0f0f] border border-white/5 rounded-xl overflow-hidden flex flex-col md:flex-row shadow-2xl">
    <!-- Map Image with Overlay -->
    <div class="w-full md:w-1/2 min-h-[300px] relative bg-[#0a0a0a]">
      <img 
        src="assets/locations/cooking-fire.jpg" 
        alt="Map Location"
        loading="lazy"
        class="absolute inset-0 w-full h-full object-cover opacity-20 grayscale mix-blend-luminosity">
      <div class="absolute inset-0 bg-gradient-to-r from-transparent to-[#0f0f0f]"></div>
      <!-- Orange location marker -->
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[#C65A1E] flex flex-col items-center drop-shadow-[0_0_15px_rgba(198,90,30,0.5)]">
        <iconify-icon icon="solar:map-point-bold" width="32"></iconify-icon>
      </div>
    </div>

    <!-- Information Panel -->
    <div class="w-full md:w-1/2 p-10 md:p-12 flex flex-col justify-center">
      <h2 class="font-['Forum'] text-3xl text-white tracking-tighter mb-8">Visit Us</h2>
      
      <div class="space-y-6">
        <div>
          <h4 class="text-[10px] text-neutral-500 uppercase tracking-wider font-medium mb-2 flex items-center gap-1.5">
            <iconify-icon icon="solar:map-point-linear" width="14"></iconify-icon> Address
          </h4>
          <p class="text-sm text-neutral-300 font-light leading-relaxed">
            Town Centre,<br/>
            St Peter Port,<br/>
            Guernsey, GY1 2PN
          </p>
        </div>

        <div class="h-px w-full bg-white/5"></div>

        <div>
          <h4 class="text-[10px] text-neutral-500 uppercase tracking-wider font-medium mb-2 flex items-center gap-1.5">
            <iconify-icon icon="solar:clock-circle-linear" width="14"></iconify-icon> Hours
          </h4>
          <div class="grid grid-cols-2 gap-2 max-w-xs text-xs text-neutral-300 font-light">
            <span class="text-neutral-500">Lunch:</span> <span>12:00 PM – 2:00 PM</span>
            <span class="text-neutral-500">Dinner:</span> <span>6:00 PM – 9:00 PM</span>
          </div>
          <p class="text-[10px] text-[#C65A1E] mt-3 font-medium">Closed on Mondays</p>
        </div>
      </div>
    </div>
  </div>
</section>
