<section id="reservation-full" class="relative z-20 py-12 px-6 bg-transparent">
  <div class="max-w-5xl mx-auto">
    <div class="bg-[#111] border border-white/5 rounded-2xl shadow-2xl backdrop-blur-xl flex flex-col md:flex-row">
      <div class="p-10 md:p-12 md:w-2/5 flex flex-col justify-center bg-gradient-to-br from-[#111] to-[#1a1a1a] rounded-t-2xl md:rounded-tr-none md:rounded-l-2xl">
        <h2 class="font-['Forum'] text-3xl md:text-4xl text-white tracking-tight mb-4">Reserve Your Table</h2>
        <p class="text-sm text-neutral-400 leading-relaxed mb-8">
          Experience unforgettable flavors in a warm, premium setting. For parties larger than 8, please contact us directly.
        </p>
        <div class="flex items-center gap-4 text-sm text-neutral-300">
          <iconify-icon icon="solar:phone-linear" width="20" class="text-[#C65A1E]"></iconify-icon>
          +44 (0) 1481 123456
        </div>
      </div>

      <div class="p-10 md:p-12 md:w-3/5 border-t md:border-t-0 md:border-l border-white/5 relative rounded-b-2xl md:rounded-bl-none md:rounded-r-2xl">
        <form (ngSubmit)="onSubmit()" class="grid grid-cols-1 sm:grid-cols-2 gap-5">
          <div class="space-y-1.5 relative z-10">
            <label class="text-xs text-neutral-400 ml-1">Full Name</label>
            <input 
              type="text" 
              [(ngModel)]="reservation.fullName"
              name="fullName"
              placeholder="John Doe" 
              class="w-full bg-[#0a0a0a] border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-[#C65A1E] focus:ring-1 focus:ring-[#C65A1E] transition-all">
          </div>

          <div class="space-y-1.5 relative z-10">
            <label class="text-xs text-neutral-400 ml-1">Phone Number</label>
            <input 
              type="tel" 
              [(ngModel)]="reservation.phone"
              name="phone"
              placeholder="+44..." 
              class="w-full bg-[#0a0a0a] border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-[#C65A1E] focus:ring-1 focus:ring-[#C65A1E] transition-all">
          </div>

          <div class="space-y-1.5 relative z-30">
            <label class="text-xs text-neutral-400 ml-1">Date</label>
            <app-custom-calendar 
              [selectedDate]="reservation.date"
              (dateSelected)="onDateSelected($event)">
            </app-custom-calendar>
          </div>

          <div class="space-y-1.5 relative z-20">
            <label class="text-xs text-neutral-400 ml-1">Time</label>
            <app-custom-dropdown
              [options]="timeSlots"
              [selectedValue]="reservation.time"
              [placeholder]="'Select time'"
              [icon]="'solar:clock-circle-linear'"
              (valueSelected)="onTimeSelected($event)">
            </app-custom-dropdown>
          </div>

          <div class="space-y-1.5 sm:col-span-2 relative z-10">
            <label class="text-xs text-neutral-400 ml-1">Number of Guests</label>
            <app-custom-dropdown
              [options]="guestOptions"
              [selectedValue]="reservation.guests"
              [placeholder]="'Select number of guests'"
              [icon]="'solar:users-group-rounded-linear'"
              (valueSelected)="onGuestsSelected($event)">
            </app-custom-dropdown>
          </div>

          <button 
            type="submit" 
            class="sm:col-span-2 mt-2 w-full px-6 py-3.5 text-sm font-medium text-[#0a0a0a] bg-white rounded-xl hover:bg-[#C65A1E] hover:text-white hover:shadow-[0_0_20px_rgba(198,90,30,0.4)] transition-all duration-300 relative z-10">
            Confirm Booking
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
